name: Build and Release VPM Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Packages/com.sizimityper.reflector-shader/package.json'

env:
  packageName: "com.sizimityper.reflector-shader"
  githubUser: "sizimityper"
  githubRepo: "reflector-shader"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      zipFile: ${{ steps.set_filenames.outputs.zipFile }}
      hash: ${{ steps.get_hash.outputs.hash }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' Packages/${{ env.packageName }}/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set filenames
        id: set_filenames
        run: |
          ZIP_FILE="${{ env.packageName }}-${{ steps.get_version.outputs.version }}.zip"
          echo "zipFile=$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "zipFile=$ZIP_FILE" >> $GITHUB_ENV

      - name: Zip the package
        uses: TheDoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: '${{ env.zipFile }}'
          directory: 'Packages/${{ env.packageName }}'
          exclusions: '*.git* /*node_modules/* .editorconfig'

      - name: Move zip to workspace root
        run: mv "Packages/${{ env.packageName }}/${{ env.zipFile }}" .

      - name: Get SHA256 hash
        id: get_hash
        run: |
          HASH=$(sha256sum "${{ env.zipFile }}" | awk '{ print $1 }')
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: '${{ env.zipFile }}'
          tag: '${{ steps.get_version.outputs.version }}'
          name: 'Version ${{ steps.get_version.outputs.version }}'
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update VPM listing (index.json)
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          ZIP_FILE="${{ env.zipFile }}"
          HASH="${{ steps.get_hash.outputs.hash }}"
          URL="https://github.com/${{ env.githubUser }}/${{ env.githubRepo }}/releases/download/${VERSION}/${ZIP_FILE}"
          DISPLAY_NAME=$(jq -r '.displayName' Packages/${{ env.packageName }}/package.json)
          DESCRIPTION=$(jq -r '.description' Packages/${{ env.packageName }}/package.json)
          UNITY=$(jq -r '.unity' Packages/${{ env.packageName }}/package.json)
          jq --arg pkg "${{ env.packageName }}" --arg ver "$VERSION" --arg url "$URL" --arg hash "$HASH" --arg dn "$DISPLAY_NAME" --arg desc "$DESCRIPTION" --arg unity "$UNITY" '.packages[$pkg].versions[$ver] = {"name":$pkg,"displayName":$dn,"version":$ver,"unity":$unity,"description":$desc,"url":$url,"zipSHA256":$hash}' Website/index.json > Website/index.json.tmp
          mv Website/index.json.tmp Website/index.json

      - name: Commit updated index.json
        uses: EndBug/add-and-commit@v9
        with:
          add: 'Website/index.json'
          message: 'chore: update VPM listing for v${{ steps.get_version.outputs.version }}'
          push: true
          default_author: github_actions

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Website folder to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'Website'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
